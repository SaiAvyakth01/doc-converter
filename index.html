<!DOCTYPE html>
<html>
<head>
  <title>Free Document Converter</title>
  <meta charset="UTF-8">
</head>
<body style="font-family: Arial; padding: 30px;">

  <h2>Free Document Converter</h2>
  <p>Convert PDF, DOCX, PPTX files easily</p>

  <input type="file" id="file" />
  <br><br>

  <label>Select output format:</label><br>
  <select id="format">
    <option value="pdf">PDF</option>
    <option value="docx">DOCX</option>
    <option value="pptx">PPTX</option>
  </select>

  <br><br>

  <button onclick="convert()">Convert</button>

  <p id="status"></p>

  <script>
    async function convert() {
      const fileInput = document.getElementById("file");
      const format = document.getElementById("format").value;
      const status = document.getElementById("status");

      if (!fileInput.files.length) {
        alert("Please select a file");
        return;
      }

      status.innerText = "Uploading & converting...";

      const formData = new FormData();
      formData.append("file", fileInput.files[0]);
      formData.append("format", format);

      const response = await fetch("/convert", {
        method: "POST",
        body: formData
      });

      const blob = await response.blob();
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "converted." + format;
      link.click();

      status.innerText = "Conversion complete ✅";
    }
  </script>

</body>
</html>
