<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doc Converter</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- pdf-lib -->
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

  <!-- fflate (ZIP support) -->
  <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>

  <!-- Your JS (MUST be defer) -->
  <script src="./app.js" defer></script>
</head>

<body class="bg-slate-900 text-white min-h-screen p-6">

  <h1 class="text-3xl font-bold mb-4">Doc Converter</h1>

  <!-- Status -->
  <div id="libStatus" class="mb-4 p-3 rounded bg-slate-800 text-sm">
    Loading libraries...
  </div>

  <!-- File input -->
  <input id="fileInput" type="file" multiple class="mb-4 block">

  <!-- Buttons -->
  <div class="grid grid-cols-2 gap-3 max-w-md">
    <button id="btnMerge" class="bg-green-600 p-2 rounded">Merge PDFs</button>
    <button id="btnSplit" class="bg-blue-600 p-2 rounded">Split PDF</button>
    <button id="btnRotate" class="bg-yellow-600 p-2 rounded">Rotate PDF</button>
    <button id="btnDelete" class="bg-red-600 p-2 rounded">Delete Pages</button>
    <button id="btnImgToPdf" class="bg-purple-600 p-2 rounded">Images → PDF</button>
    <button id="btnImgZip" class="bg-indigo-600 p-2 rounded">Images → ZIP</button>
  </div>

</body>
</html>
