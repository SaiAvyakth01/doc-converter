<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Doc Converter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.webmanifest" />
</head>

<body>
  <div class="bg-gradient"></div>

  <main class="container">
    <div class="card">
      <h1>Doc Converter</h1>
      <p class="subtitle">
        Convert documents instantly using a fast, secure cloud engine.
      </p>

      <div class="form-group">
        <label>Select File</label>
        <input type="file" id="fileInput" />
      </div>

      <div class="form-group">
        <label>Convert To</label>
        <select id="toFormat">
          <option value="pdf">PDF</option>
          <option value="docx">DOCX</option>
        </select>
      </div>

      <button id="convertBtn">Convert Now</button>

      <p id="status" class="status">Ready to convert 🚀</p>
    </div>

    <footer>
      Built with ❤️ using Cloudflare & GitHub
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
